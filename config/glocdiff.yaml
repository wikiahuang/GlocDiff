project_name: glocdiff
run_name: glocdiff
# training setup
logger: wandb # options: tensorboard, wandb, none
batch_size: 96
epochs: 20
num_workers: 4
lr: 1e-4
optimizer: adamw
scheduler: "cosine"
warmup: False
warmup_epochs: 4
seed: 0
obs_type: image
load_run: "/home/weiqi/code/GlocDiff/utils/logs/flona_plus_19.pth"  # set to "project_name/run_name" to resume from checkpoint
metric_waypoint_spacing: 0.045
# model params
vision_encoder: flona_vint
encoding_size: 256
floorplan_encoder: efficientnet-b0
cond_predict_scale: False
mha_num_attention_heads: 4
mha_num_attention_layers: 4
mha_ff_dim_factor: 4
down_dims: [64, 128, 256]
max_sigma: 0.1
# diffusion model params
num_diffusion_iters: 10

# normalization for the action space
normalize: True

# context
context_size: 5 # 5
alpha: 1e-3
beta: 10

# action output params
len_traj_pred: 32

# dataset specific parameters
image_size: [96, 96] # width, height
datasets:

  data_folder: /home/weiqi/data/flona/scenes_117
  traversable_map_folder: /home/weiqi/data/flona/trav_maps 
