name: GlocDiff
channels:
  - defaults
dependencies:
  - python=3.8.5
  - numpy
  - matplotlib
  - ipykernel
  - pip
  - pip:
    # torch 2.5+ no longer publishes cp38 wheels, so this env is pinned to
    # the last cu124 build that still supports Python 3.8 (required by iGibson)
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch==2.4.1
    - torchvision==0.19.1
    - tqdm==4.64.0
    - opencv-python==4.6.0.66
    - h5py==3.6.0
    - wandb==0.12.18
    - efficientnet-pytorch
    - warmup-scheduler
    - diffusers==0.33.1
    # transformers must stay on the 4.x line: 5.x removed FLAX_WEIGHTS_NAME,
    # which breaks diffusers' Marigold pipeline import
    - transformers==4.46.0
    - lmdb
    - einops
    - vit-pytorch
    - positional-encodings
    - tensorboard
    - accelerate
    - networkx
    - pyyaml
    # diffusion_policy is not published on PyPI; clone it into the project
    # root and install it in editable mode separately:
    #   git clone https://github.com/real-stanford/diffusion_policy.git
    #   pip install -e diffusion_policy/
    # (it must live at GlocDiff/diffusion_policy/ for the import path to resolve)
    #
    # iGibson requires Python 3.8 to compile its bundled pybind11 extension
    # (newer Python versions break its CPython internals usage). Install it
    # separately after creating this env:
    #   pip install -e iGibson/
